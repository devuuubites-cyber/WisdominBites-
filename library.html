<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WisdomInBites — The Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════
   LIQUID GLASS DESIGN SYSTEM — WisdomInBites
   Apple visionOS / iOS 26 Liquid Glass aesthetic
   ═══════════════════════════════════════════════════ */

:root {
  --obsidian:#060810; --deep-navy:#080d1a; --navy:#0c1428;
  --gold:#c9a84c; --gold-light:#e8c97a; --gold-dim:#7a6330;
  --cream:#f5efe0; --cream-dim:#b8ad96; --muted:#3a4060;
  --model-color:#4a9eba;

  /* Liquid Glass tokens */
  --glass-bg: rgba(255,255,255,0.04);
  --glass-bg-strong: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.10);
  --glass-border-gold: rgba(201,168,76,0.18);
  --glass-border-blue: rgba(74,158,186,0.18);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
  --glass-shadow-hover: 0 20px 60px rgba(0,0,0,0.6), 0 4px 16px rgba(201,168,76,0.12);
  --glass-inset: inset 0 1px 0 rgba(255,255,255,0.08);
  --glass-specular: inset 0 0 0 1px rgba(255,255,255,0.05);

  --blur-xs: blur(4px);
  --blur-sm: blur(8px);
  --blur-md: blur(16px);
  --blur-lg: blur(24px);
  --blur-xl: blur(40px);

  --glow-gold: rgba(201,168,76,0.12);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}

body {
  background: var(--obsidian);
  color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  overflow-x: hidden;
  cursor: none;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(74,158,186,0.03) 0%, transparent 50%);
}

/* CANVAS */
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* ══ LIQUID GLASS CURSOR ══ */
.cursor {
  position:fixed; width:10px; height:10px;
  background:var(--gold); border-radius:50%;
  pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  transition:width .3s cubic-bezier(.23,1,.32,1), height .3s cubic-bezier(.23,1,.32,1);
  box-shadow:0 0 12px rgba(201,168,76,0.8),0 0 24px rgba(201,168,76,0.4);
}
.cursor-ring {
  position:fixed; width:40px; height:40px;
  border-radius:50%; pointer-events:none; z-index:9998;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.03);
  backdrop-filter:var(--blur-xs);
  -webkit-backdrop-filter:var(--blur-xs);
  border:1px solid rgba(201,168,76,0.3);
  box-shadow:0 0 20px rgba(201,168,76,0.1),inset 0 1px 0 rgba(255,255,255,0.1);
  transition:left .12s cubic-bezier(.23,1,.32,1),top .12s cubic-bezier(.23,1,.32,1),width .3s,height .3s;
}

/* ══ LIQUID GLASS NAV ══ */
nav {
  position:fixed; top:0; left:0; right:0;
  z-index:200; padding:16px 60px;
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(6,8,16,0.55);
  backdrop-filter:var(--blur-xl) saturate(180%);
  -webkit-backdrop-filter:var(--blur-xl) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,0.07);
  box-shadow:0 1px 0 rgba(255,255,255,0.05),0 8px 32px rgba(0,0,0,0.4),var(--glass-inset);
}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold);text-decoration:none;letter-spacing:.05em;text-shadow:0 0 20px rgba(201,168,76,0.5);}
.nav-logo span{color:var(--cream-dim);}
.nav-right{display:flex;align-items:center;gap:20px;}
.nav-search-wrap{position:relative;}
.nav-search {
  background:rgba(255,255,255,0.06);
  backdrop-filter:var(--blur-sm);
  -webkit-backdrop-filter:var(--blur-sm);
  border:1px solid var(--glass-border);
  border-radius:100px;
  color:var(--cream);
  font-family:'DM Mono',monospace;
  font-size:.65rem; letter-spacing:.1em;
  padding:9px 18px 9px 38px;
  outline:none; width:220px;
  transition:all .4s cubic-bezier(.23,1,.32,1);
  box-shadow:var(--glass-inset),0 2px 12px rgba(0,0,0,0.2);
}
.nav-search:focus {
  border-color:var(--glass-border-gold);
  background:rgba(201,168,76,0.06);
  width:300px;
  box-shadow:0 0 0 1px rgba(201,168,76,0.15),var(--glass-inset),0 4px 20px rgba(201,168,76,0.08);
}
.nav-search::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.7rem;pointer-events:none;}
.nav-count{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;color:var(--gold);opacity:.7;}

/* PAGE CONTENT */
.page-content{position:relative;z-index:1;}

/* READING PROGRESS BAR */
.reading-progress-bar {
  position:fixed; top:0; left:0;
  height:2px; width:0%;
  background:linear-gradient(to right,var(--gold-dim),var(--gold),var(--gold-light));
  z-index:9999; transition:width .1s linear;
  box-shadow:0 0 10px rgba(201,168,76,0.6);
}

/* ══ HERO ══ */
.library-hero{padding:160px 60px 80px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end;}
.library-eyebrow{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;opacity:.8;}
.library-title{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,5vw,4.5rem);font-weight:900;line-height:1;}
.library-title em{font-style:italic;color:var(--gold);text-shadow:0 0 40px rgba(201,168,76,0.4);}
.library-subtitle{font-size:1rem;font-weight:300;color:var(--cream-dim);line-height:1.7;margin-top:20px;}

/* STATS — liquid glass pills */
.stats-row{display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap;}
.stat-item {
  text-align:center; padding:20px 24px;
  background:var(--glass-bg);
  backdrop-filter:var(--blur-md);
  -webkit-backdrop-filter:var(--blur-md);
  border:1px solid var(--glass-border-gold);
  border-radius:20px;
  box-shadow:var(--glass-shadow),var(--glass-inset);
  position:relative; overflow:hidden;
  transition:transform .3s cubic-bezier(.23,1,.32,1),box-shadow .3s;
}
.stat-item::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.15),transparent);
}
.stat-item:hover{transform:translateY(-3px) scale(1.02);box-shadow:var(--glass-shadow-hover);}
.stat-n{font-family:'Playfair Display',serif;font-size:2.8rem;font-weight:900;color:var(--gold);line-height:1;text-shadow:0 0 30px rgba(201,168,76,0.5);}
.stat-l{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-dim);margin-top:6px;}

/* ══ DAILY DUO BANNER ══ */
.daily-duo{max-width:1200px;margin:0 auto 40px;padding:0 60px;}
.daily-duo-inner {
  background:rgba(8,13,26,0.5);
  backdrop-filter:var(--blur-lg) saturate(180%);
  -webkit-backdrop-filter:var(--blur-lg) saturate(180%);
  border:1px solid var(--glass-border);
  border-radius:24px; padding:24px 32px;
  display:flex; gap:24px; align-items:center;
  box-shadow:var(--glass-shadow),var(--glass-inset);
  position:relative; overflow:hidden;
}
.daily-duo-inner::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(255,255,255,0.1) 30%,rgba(201,168,76,0.15) 50%,rgba(255,255,255,0.1) 70%,transparent 95%);
}
.daily-duo-inner::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse at 30% 50%,rgba(201,168,76,0.03),transparent 60%),
             radial-gradient(ellipse at 70% 50%,rgba(74,158,186,0.03),transparent 60%);
}
.duo-label {
  font-family:'DM Mono',monospace; font-size:.5rem; letter-spacing:.3em;
  text-transform:uppercase; color:var(--gold); opacity:.7; white-space:nowrap;
  writing-mode:vertical-lr; transform:rotate(180deg);
}
.duo-cards{display:flex;gap:16px;flex:1;}
.duo-card {
  flex:1; padding:16px 18px;
  background:var(--glass-bg);
  backdrop-filter:var(--blur-xs);
  border:1px solid var(--glass-border);
  border-radius:16px; cursor:none;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  position:relative; overflow:hidden;
  box-shadow:var(--glass-inset);
}
.duo-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.08),transparent);}
.duo-card:hover{transform:translateY(-3px);background:rgba(255,255,255,0.06);}
.duo-card.bias:hover{border-color:rgba(201,168,76,0.2);box-shadow:0 8px 24px rgba(201,168,76,0.08),var(--glass-inset);}
.duo-card.model:hover{border-color:rgba(74,158,186,0.2);box-shadow:0 8px 24px rgba(74,158,186,0.08),var(--glass-inset);}
.duo-card-type{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.duo-card-type::before{content:'';width:16px;height:1px;}
.duo-card.bias .duo-card-type{color:var(--gold);}
.duo-card.bias .duo-card-type::before{background:var(--gold);}
.duo-card.model .duo-card-type{color:var(--model-color);}
.duo-card.model .duo-card-type::before{background:var(--model-color);}
.duo-card-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--cream);margin-bottom:4px;}
.duo-card-tagline{font-size:.78rem;font-style:italic;color:var(--cream-dim);line-height:1.4;}
.duo-cta{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);white-space:nowrap;opacity:.6;writing-mode:vertical-lr;}

/* ══ FILTER BAR ══ */
.filter-bar{max-width:1200px;margin:0 auto;padding:0 60px 50px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-btn {
  font-family:'DM Mono',monospace; font-size:.58rem; letter-spacing:.15em; text-transform:uppercase;
  padding:9px 20px; border-radius:100px;
  border:1px solid var(--glass-border);
  background:var(--glass-bg);
  backdrop-filter:var(--blur-sm); -webkit-backdrop-filter:var(--blur-sm);
  color:var(--cream-dim); cursor:none;
  transition:all .25s cubic-bezier(.23,1,.32,1);
  box-shadow:var(--glass-inset),0 2px 8px rgba(0,0,0,0.2);
  position:relative; overflow:hidden;
}
.filter-btn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.12),transparent);opacity:0;transition:opacity .3s;}
.filter-btn:hover::before{opacity:1;}
.filter-btn:hover{background:rgba(201,168,76,0.08);border-color:var(--glass-border-gold);color:var(--gold);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,168,76,0.12),var(--glass-inset);}
.filter-btn.active{background:rgba(201,168,76,0.12);border-color:var(--gold);color:var(--gold);box-shadow:0 0 0 1px rgba(201,168,76,0.2),0 4px 20px rgba(201,168,76,0.15),var(--glass-inset);}
.filter-btn.active-model{background:rgba(74,158,186,0.1);border-color:var(--model-color);color:var(--model-color);box-shadow:0 0 0 1px rgba(74,158,186,0.2),0 4px 20px rgba(74,158,186,0.12),var(--glass-inset);}
.filter-sep{width:1px;height:20px;background:rgba(255,255,255,0.08);margin:0 4px;}

/* SECTION DIVIDERS */
.lib-section{max-width:1200px;margin:0 auto;padding:0 60px;}
.lib-section-header{display:flex;align-items:center;gap:24px;margin-bottom:36px;padding-top:40px;}
.lib-section-line{flex:1;height:1px;}
.lib-section-header.biases .lib-section-line{background:linear-gradient(to right,rgba(201,168,76,0.4),transparent);}
.lib-section-header.models .lib-section-line{background:linear-gradient(to right,rgba(74,158,186,0.35),transparent);}
.lib-section-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;white-space:nowrap;}
.lib-section-header.biases .lib-section-title{color:var(--gold);text-shadow:0 0 30px rgba(201,168,76,0.3);}
.lib-section-header.models .lib-section-title{color:var(--model-color);text-shadow:0 0 30px rgba(74,158,186,0.3);}
.lib-section-count{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;color:var(--muted);}

/* ══ LIBRARY GRID ══ */
.library-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-bottom:80px;}

/* ══ LIQUID GLASS CARD ══ */
.lesson-card {
  background:rgba(8,13,26,0.45);
  backdrop-filter:var(--blur-md) saturate(150%);
  -webkit-backdrop-filter:var(--blur-md) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:24px; padding:28px 26px;
  cursor:none; position:relative; overflow:hidden;
  transform-style:preserve-3d;
  transform:perspective(1000px) rotateX(0deg) rotateY(0deg) translateZ(0px);
  transition:transform .5s cubic-bezier(.23,1,.32,1),box-shadow .4s cubic-bezier(.23,1,.32,1),border-color .3s,background .3s;
  animation:fadeUp .5s both;
  box-shadow:var(--glass-shadow),var(--glass-inset),var(--glass-specular);
}
/* Liquid glass top specular */
.lesson-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg,transparent 5%,rgba(255,255,255,0.12) 40%,rgba(255,255,255,0.18) 50%,rgba(255,255,255,0.12) 60%,transparent 95%);
  border-radius:24px 24px 0 0;
}
/* Accent top line */
.lesson-card::after {
  content:''; position:absolute; top:0; left:15%; right:15%;
  height:2px; transform:scaleX(0); transform-origin:left;
  transition:transform .4s cubic-bezier(.23,1,.32,1); border-radius:0 0 4px 4px;
}
.lesson-card.bias::after{background:linear-gradient(to right,transparent,var(--gold),var(--gold-light),var(--gold),transparent);box-shadow:0 0 16px rgba(201,168,76,0.6);}
.lesson-card.model::after{background:linear-gradient(to right,transparent,var(--model-color),#7ecfef,var(--model-color),transparent);box-shadow:0 0 16px rgba(74,158,186,0.5);}
.lesson-card:hover::after{transform:scaleX(1);}

.lesson-card.bias:hover{background:rgba(201,168,76,0.06);border-color:rgba(201,168,76,0.25);box-shadow:0 0 0 1px rgba(201,168,76,0.1),0 24px 64px rgba(0,0,0,0.65),0 8px 24px rgba(201,168,76,0.08),var(--glass-inset);transform:perspective(1000px) translateZ(12px) translateY(-6px);}
.lesson-card.model:hover{background:rgba(74,158,186,0.05);border-color:rgba(74,158,186,0.25);box-shadow:0 0 0 1px rgba(74,158,186,0.1),0 24px 64px rgba(0,0,0,0.65),0 8px 24px rgba(74,158,186,0.08),var(--glass-inset);transform:perspective(1000px) translateZ(12px) translateY(-6px);}

.card-inner-glow{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(255,255,255,0.03),transparent 60%);border-radius:24px;pointer-events:none;opacity:0;transition:opacity .4s;}
.lesson-card:hover .card-inner-glow{opacity:1;}

.read-badge{position:absolute;top:14px;right:14px;width:22px;height:22px;background:linear-gradient(135deg,var(--gold),var(--gold-light));border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.6rem;color:var(--obsidian);font-weight:bold;box-shadow:0 0 16px rgba(201,168,76,0.7),0 0 32px rgba(201,168,76,0.3);z-index:2;}
.lesson-card.read .read-badge{display:flex;}
.lesson-card.read{border-color:rgba(201,168,76,0.22)!important;}

.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.card-num{font-family:'Playfair Display',serif;font-size:2.4rem;font-weight:900;line-height:1;opacity:.06;user-select:none;}
.card-tag{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.18em;text-transform:uppercase;padding:4px 10px;border-radius:100px;border:1px solid;}
.bias .card-tag{color:var(--gold);border-color:rgba(201,168,76,0.3);background:rgba(201,168,76,0.06);}
.model .card-tag{color:var(--model-color);border-color:rgba(74,158,186,0.3);background:rgba(74,158,186,0.06);}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--cream);margin-bottom:8px;line-height:1.2;}
.card-tagline{font-size:.85rem;font-style:italic;font-weight:300;color:var(--cream-dim);line-height:1.5;margin-bottom:16px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;}
.card-read{font-family:'DM Mono',monospace;font-size:.52rem;letter-spacing:.1em;color:var(--muted);}
.card-difficulty{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 9px;border-radius:100px;}
.card-difficulty.Foundational{color:#7ecb8f;background:rgba(126,203,143,0.1);border:1px solid rgba(126,203,143,0.2);}
.card-difficulty.Intermediate{color:#e8c97a;background:rgba(232,201,122,0.1);border:1px solid rgba(232,201,122,0.2);}
.card-difficulty.Advanced{color:#e88a7a;background:rgba(232,138,122,0.1);border:1px solid rgba(232,138,122,0.2);}
.card-arrow{position:absolute;bottom:20px;right:20px;width:30px;height:30px;border-radius:50%;border:1px solid rgba(201,168,76,0.2);background:rgba(201,168,76,0.05);backdrop-filter:var(--blur-xs);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--gold-dim);transition:all .3s cubic-bezier(.23,1,.32,1);opacity:0;box-shadow:var(--glass-inset);}
.lesson-card:hover .card-arrow{opacity:1;transform:translateX(3px);background:rgba(201,168,76,0.12);border-color:var(--gold);color:var(--gold);}
.hidden{display:none!important;}

/* 3D tilt active state */
.lesson-card.tilt-active{transition:transform .1s linear,box-shadow .1s linear;}

/* ══ LIQUID GLASS OVERLAY ══ */
.lesson-overlay{position:fixed;inset:0;z-index:500;background:rgba(4,6,12,0.7);backdrop-filter:var(--blur-xl) saturate(120%);-webkit-backdrop-filter:var(--blur-xl) saturate(120%);overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .4s cubic-bezier(.23,1,.32,1);}
.lesson-overlay.open{opacity:1;pointer-events:all;}
.overlay-inner{max-width:760px;margin:0 auto;padding:120px 40px 100px;transform:translateY(30px);transition:transform .6s cubic-bezier(.23,1,.32,1);}
.lesson-overlay.open .overlay-inner{transform:translateY(0);}
.overlay-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:50px;}
.back-btn{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);background:rgba(201,168,76,0.06);backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);border:1px solid rgba(201,168,76,0.2);border-radius:100px;padding:10px 22px;cursor:none;transition:all .3s cubic-bezier(.23,1,.32,1);display:flex;align-items:center;gap:10px;box-shadow:var(--glass-inset),0 2px 12px rgba(0,0,0,0.2);}
.back-btn:hover{background:rgba(201,168,76,0.12);border-color:var(--gold);box-shadow:0 0 0 1px rgba(201,168,76,0.15),var(--glass-inset),0 4px 20px rgba(201,168,76,0.1);transform:translateX(-3px);}
.overlay-progress{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.15em;color:var(--muted);background:var(--glass-bg);backdrop-filter:var(--blur-xs);border:1px solid var(--glass-border);border-radius:100px;padding:6px 14px;}

/* AUDIO PLAYER */
.audio-player{background:rgba(12,20,40,0.6);backdrop-filter:var(--blur-md) saturate(150%);-webkit-backdrop-filter:var(--blur-md) saturate(150%);border:1px solid var(--glass-border-gold);border-radius:20px;padding:16px 22px;display:flex;align-items:center;gap:16px;margin-bottom:40px;position:relative;overflow:hidden;box-shadow:var(--glass-shadow),var(--glass-inset);transition:box-shadow .3s;}
.audio-player.audio-playing{box-shadow:0 0 0 1px rgba(201,168,76,0.15),var(--glass-shadow),0 0 30px rgba(201,168,76,0.08);}
.audio-player::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);opacity:.6;}

/* SEARCH SUGGESTIONS */
.search-suggestions{position:absolute;top:calc(100% + 10px);left:0;right:0;background:rgba(6,8,16,0.92);backdrop-filter:var(--blur-xl) saturate(180%);-webkit-backdrop-filter:var(--blur-xl) saturate(180%);border:1px solid var(--glass-border-gold);border-radius:20px;z-index:9999;overflow:hidden;max-height:0;transition:max-height .3s cubic-bezier(.23,1,.32,1),opacity .25s;opacity:0;pointer-events:none;box-shadow:var(--glass-shadow),var(--glass-inset);}

/* CELEBRATION */
#celebCanvas{position:fixed;inset:0;z-index:9980;pointer-events:none;}
.celeb-overlay{position:fixed;inset:0;z-index:9970;pointer-events:none;background:radial-gradient(ellipse at 50% 50%,rgba(201,168,76,0.18),transparent 70%);opacity:0;transition:opacity .3s;}
.celeb-overlay.flash{animation:celebFlash .9s ease-out forwards;}
.celeb-ring{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9985;pointer-events:none;opacity:0;}
.celeb-ring.show{animation:celebRingPop .7s cubic-bezier(.17,.89,.32,1.28) forwards;}
.celeb-ring svg{width:180px;height:180px;}
.celeb-ring circle.track{fill:none;stroke:rgba(201,168,76,.15);stroke-width:4;}
.celeb-ring circle.prog{fill:none;stroke:var(--gold);stroke-width:4;stroke-linecap:round;stroke-dasharray:502;stroke-dashoffset:502;transform:rotate(-90deg);transform-origin:90px 90px;}
.celeb-ring.show .prog{animation:dashDraw .6s .1s ease-out forwards;}
.celeb-check{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3.5rem;opacity:0;}
.celeb-ring.show .celeb-check{animation:checkPop .4s .5s cubic-bezier(.17,.89,.32,1.28) forwards;}
.celeb-words{position:fixed;left:50%;top:calc(50% + 110px);transform:translateX(-50%);z-index:9985;pointer-events:none;opacity:0;text-align:center;white-space:nowrap;}
.celeb-words.show{animation:wordsRise .6s .5s ease-out forwards;}
.celeb-words .w1{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:900;color:var(--gold);display:block;}
.celeb-words .w2{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:var(--cream-dim);opacity:.7;display:block;margin-top:4px;}

/* KEYFRAMES */
@keyframes fadeUp{from{opacity:0;transform:translateY(24px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes celebFlash{0%{opacity:0}20%{opacity:1}100%{opacity:0}}
@keyframes celebRingPop{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}60%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes dashDraw{to{stroke-dashoffset:0}}
@keyframes checkPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0)}70%{transform:translate(-50%,-50%) scale(1.3)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes wordsRise{0%{opacity:0;transform:translateX(-50%) translateY(20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--obsidian);}
::-webkit-scrollbar-thumb{background:linear-gradient(to bottom,var(--gold-dim),rgba(201,168,76,0.3));border-radius:2px;}

@media(max-width:900px){nav{padding:16px 24px;}.library-hero{grid-template-columns:1fr;padding:120px 24px 60px;gap:30px;}.filter-bar,.lib-section{padding-left:24px;padding-right:24px;}.overlay-inner{padding:100px 24px 80px;}.lesson-title-large{font-size:2rem;}.stats-row{gap:12px;}.daily-duo{padding:0 24px;}}
