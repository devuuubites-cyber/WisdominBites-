<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WisdomInBites — The Library</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --obsidian:#060810; --deep-navy:#080d1a; --navy:#0c1428;
  --gold:#c9a84c; --gold-light:#e8c97a; --gold-dim:#7a6330;
  --cream:#f5efe0; --cream-dim:#b8ad96; --muted:#3a4060;
  --model-color:#4a9eba; --glow-gold:rgba(201,168,76,0.12);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--obsidian);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:18px;overflow-x:hidden;cursor:none;}

/* CANVAS */
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}

/* CURSOR */
.cursor{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .3s,height .3s;}
.cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(201,168,76,0.4);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:20px 60px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(16px);background:rgba(6,8,16,0.88);border-bottom:1px solid rgba(201,168,76,0.1);}
.nav-logo{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold);text-decoration:none;letter-spacing:.05em;}
.nav-logo span{color:var(--cream-dim);}
.nav-right{display:flex;align-items:center;gap:24px;}
.nav-search-wrap{position:relative;}
.nav-search{background:rgba(255,255,255,0.04);border:1px solid rgba(201,168,76,0.15);color:var(--cream);font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.1em;padding:9px 16px 9px 36px;outline:none;width:220px;transition:all .3s;}
.nav-search:focus{border-color:var(--gold);background:rgba(201,168,76,0.04);width:320px;}
.nav-search::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.7rem;pointer-events:none;}
.nav-count{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;color:var(--gold);opacity:.7;}
.nav-done{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;color:var(--gold);opacity:.55;transition:all .4s;}
.streak-badge{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;color:var(--gold);opacity:.75;transition:all .3s;cursor:default;}

/* MAIN CONTENT ABOVE CANVAS */
.page-content{position:relative;z-index:1;}

/* HERO */
.library-hero{padding:160px 60px 60px;max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:end;}
.library-eyebrow{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:20px;}
.library-title{font-family:'Playfair Display',serif;font-size:clamp(2.5rem,5vw,4.5rem);font-weight:900;line-height:1;}
.library-title em{font-style:italic;color:var(--gold);}
.library-subtitle{font-size:1rem;font-weight:300;color:var(--cream-dim);line-height:1.7;margin-top:20px;}
.stats-row{display:flex;gap:40px;align-items:flex-end;}
.stat-item{text-align:center;}
.stat-n{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;color:var(--gold);line-height:1;transition:all .4s;}
.stat-l{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--cream-dim);margin-top:6px;}
.stat-divider{width:1px;height:60px;background:rgba(201,168,76,0.2);}

/* PROGRESS BAR */
.progress-wrap{max-width:1200px;margin:0 auto;padding:0 60px 50px;display:flex;align-items:center;gap:20px;}
.progress-bar-outer{flex:1;height:2px;background:rgba(201,168,76,0.1);border-radius:2px;overflow:hidden;position:relative;}
.progress-bar-inner{height:100%;background:linear-gradient(to right,var(--gold-dim),var(--gold),var(--gold-light));border-radius:2px;transition:width 1s cubic-bezier(.23,1,.32,1);width:0%;}
.progress-label{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);white-space:nowrap;opacity:.7;transition:all .3s;min-width:110px;text-align:right;}

/* TODAY'S STUDY */
.today-section{margin-top:28px;padding-top:28px;border-top:1px solid rgba(201,168,76,0.1);}
.today-label{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:12px;opacity:.65;display:flex;align-items:center;gap:8px;}
.today-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(201,168,76,0.2),transparent);}
.today-cards{display:flex;flex-direction:column;gap:8px;}
.today-card{background:rgba(8,13,26,0.7);border:1px solid rgba(201,168,76,0.1);padding:12px 16px;cursor:none;transition:all .3s;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;}
.today-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--gold);transform:scaleY(0);transform-origin:bottom;transition:transform .3s;}
.today-card:hover{border-color:rgba(201,168,76,.28);transform:translateX(3px);background:rgba(8,13,26,0.9);}
.today-card:hover::before{transform:scaleY(1);}
.today-card-icon{font-size:1.3rem;line-height:1;flex-shrink:0;}
.today-card-info{flex:1;min-width:0;}
.today-card-title{font-family:'Playfair Display',serif;font-size:.95rem;font-weight:700;color:var(--cream);margin-bottom:3px;line-height:1.2;}
.today-card-tag{font-family:'DM Mono',monospace;font-size:.48rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);opacity:.65;}
.today-card-arrow{font-size:.7rem;color:var(--gold-dim);opacity:0;transition:opacity .3s;flex-shrink:0;}
.today-card:hover .today-card-arrow{opacity:1;}
.today-card.already-read .today-card-title::after{content:' ✓';color:var(--gold);font-size:.7em;opacity:.8;}

/* FILTER BAR */
.filter-bar{max-width:1200px;margin:0 auto;padding:0 60px 50px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.filter-btn{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;padding:9px 20px;border:1px solid rgba(201,168,76,0.2);background:transparent;color:var(--cream-dim);cursor:none;transition:all .25s;}
.filter-btn:hover,.filter-btn.active{background:rgba(201,168,76,0.08);border-color:var(--gold);color:var(--gold);}
.filter-btn.active-model{background:rgba(74,158,186,0.1);border-color:var(--model-color);color:var(--model-color);}
.filter-sep{width:1px;height:20px;background:rgba(201,168,76,0.15);margin:0 6px;}

/* SECTION DIVIDER */
.lib-section{max-width:1200px;margin:0 auto;padding:0 60px;}
.lib-section-header{display:flex;align-items:center;gap:24px;margin-bottom:36px;padding-top:40px;}
.lib-section-line{flex:1;height:1px;}
.lib-section-header.biases .lib-section-line{background:linear-gradient(to right,var(--gold-dim),transparent);}
.lib-section-header.models .lib-section-line{background:linear-gradient(to right,var(--model-color),transparent);opacity:.4;}
.lib-section-title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;white-space:nowrap;}
.lib-section-header.biases .lib-section-title{color:var(--gold);}
.lib-section-header.models .lib-section-title{color:var(--model-color);}
.lib-section-count{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.2em;color:var(--muted);}

/* GRID */
.library-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:2px;margin-bottom:80px;}

/* CARD */
.lesson-card{background:rgba(8,13,26,0.88);border:1px solid rgba(201,168,76,0.08);padding:36px 32px;cursor:none;position:relative;overflow:hidden;transition:transform .4s cubic-bezier(.23,1,.32,1),border-color .3s,box-shadow .4s;transform-style:preserve-3d;animation:fadeUp .5s both;}
.lesson-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;transform:scaleX(0);transform-origin:left;transition:transform .4s;}
.lesson-card.bias::before{background:linear-gradient(to right,transparent,var(--gold),transparent);}
.lesson-card.model::before{background:linear-gradient(to right,transparent,var(--model-color),transparent);}
.lesson-card:hover{transform:translateY(-6px);box-shadow:0 30px 60px rgba(0,0,0,.5);}
.lesson-card.bias:hover{border-color:rgba(201,168,76,.25);}
.lesson-card.model:hover{border-color:rgba(74,158,186,.25);}
.lesson-card:hover::before{transform:scaleX(1);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.card-num{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;line-height:1;opacity:.07;}
.card-icon{font-size:1.6rem;line-height:1;}
.card-tag{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.18em;text-transform:uppercase;padding:4px 10px;border:1px solid;}
.bias .card-tag{color:var(--gold);border-color:var(--gold-dim);}
.model .card-tag{color:var(--model-color);border-color:rgba(74,158,186,.4);}
.card-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--cream);margin-bottom:8px;line-height:1.2;}
.card-tagline{font-size:.85rem;font-style:italic;font-weight:300;color:var(--cream-dim);line-height:1.5;margin-bottom:18px;}
.card-footer{display:flex;justify-content:space-between;align-items:center;}
.card-read{font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:.1em;color:var(--muted);}
.card-difficulty{font-family:'DM Mono',monospace;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;}
.card-difficulty.Foundational{color:#7ecb8f;background:rgba(126,203,143,.1);}
.card-difficulty.Intermediate{color:#e8c97a;background:rgba(232,201,122,.1);}
.card-difficulty.Advanced{color:#e88a7a;background:rgba(232,138,122,.1);}
.card-arrow{position:absolute;bottom:24px;right:24px;width:28px;height:28px;border:1px solid rgba(201,168,76,0.2);display:flex;align-items:center;justify-content:center;font-size:.7rem;color:var(--gold-dim);transition:all .3s;opacity:0;}
.lesson-card:hover .card-arrow{opacity:1;}
.hidden{display:none!important;}

/* READ BADGE ON CARD */
.read-badge{position:absolute;top:12px;right:12px;width:24px;height:24px;background:var(--gold);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:.65rem;color:var(--obsidian);font-weight:bold;box-shadow:0 0 16px rgba(201,168,76,.6),0 0 32px rgba(201,168,76,.2);z-index:2;}
.lesson-card.read .read-badge{display:flex;}
.lesson-card.read{border-color:rgba(201,168,76,.25)!important;}
.lesson-card.read::after{content:'';position:absolute;inset:0;background:rgba(201,168,76,.025);pointer-events:none;}
