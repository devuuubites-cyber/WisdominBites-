<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Wisdom Lost</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --obsidian: #060810;
            --gold: #c9a84c;
            --cream: #f5efe0;
            --cream-dim: #b8ad96;
        }

        body {
            background-color: var(--obsidian);
            color: var(--cream);
            font-family: 'Playfair Display', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            overflow: hidden;
        }

        .error-num {
            font-size: 8rem;
            font-weight: 900;
            font-style: italic;
            color: transparent;
            -webkit-text-stroke: 1px var(--gold);
            margin-bottom: 0;
            line-height: 1;
        }

        h1 {
            font-size: 2rem;
            margin-top: 0;
            color: var(--cream);
        }

        p {
            font-family: 'DM Mono', monospace;
            font-size: 0.8rem;
            color: var(--cream-dim);
            max-width: 400px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        .btn-home {
            font-family: 'DM Mono', monospace;
            text-decoration: none;
            color: var(--obsidian);
            background: var(--gold);
            padding: 12px 30px;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-home:hover {
            background: #e8c97a;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

    <div class="error-num">404</div>
    <h1>Wisdom Lost.</h1>
    <p>Even the most logical minds take a wrong turn sometimes. This page doesn't exist.</p>
    
    <a href="index.html" class="btn-home">Return to Wisdom</a>

</body>
</html>
