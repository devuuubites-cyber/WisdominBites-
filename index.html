<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WisdomInBites — Wisdom in Minutes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>

/* ═══════════════════════════════════════════════════
   LIQUID GLASS DESIGN SYSTEM — WisdomInBites Index
   Apple visionOS / iOS 26 Liquid Glass aesthetic
   ═══════════════════════════════════════════════════ */

:root {
  --obsidian: #05070a;
  --navy: #0c1428;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: #7a6330;
  --cream: #f5efe0;
  --cream-dim: #b8ad96;
  --muted: #4a5068;

  /* Liquid Glass tokens */
  --glass-bg: rgba(255,255,255,0.04);
  --glass-bg-strong: rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.10);
  --glass-border-gold: rgba(201,168,76,0.20);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.45), 0 2px 8px rgba(0,0,0,0.3);
  --glass-shadow-hover: 0 24px 64px rgba(0,0,0,0.65), 0 4px 20px rgba(201,168,76,0.12);
  --glass-inset: inset 0 1px 0 rgba(255,255,255,0.08);
  --glass-specular: inset 0 0 0 1px rgba(255,255,255,0.05);

  --blur-xs: blur(4px);
  --blur-sm: blur(8px);
  --blur-md: blur(16px);
  --blur-lg: blur(24px);
  --blur-xl: blur(40px);

  --glow: rgba(201,168,76,0.15);
}

*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--obsidian);
  color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  line-height: 1.7;
  overflow-x: hidden;
  cursor: none;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(201,168,76,0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(74,158,186,0.03) 0%, transparent 50%);
}

/* ── STARFIELD ── */
canvas#starfield {
  position:fixed; top:0; left:0;
  width:100%; height:100%;
  z-index:0; pointer-events:none;
}

/* ── READING PROGRESS ── */
#progress-bar {
  position:fixed; top:0; left:0;
  height:2px; width:0%;
  background:linear-gradient(to right, var(--gold-dim), var(--gold), var(--gold-light));
  z-index:10001; transition:width .1s linear;
  box-shadow:0 0 10px rgba(201,168,76,0.6);
}

/* ══ LIQUID GLASS CURSOR ══ */
.cursor {
  position:fixed; width:10px; height:10px;
  background:var(--gold); border-radius:50%;
  pointer-events:none; z-index:10000;
  transform:translate(-50%,-50%);
  mix-blend-mode:screen;
  box-shadow:0 0 12px rgba(201,168,76,0.8), 0 0 24px rgba(201,168,76,0.4);
  transition:width .3s cubic-bezier(.23,1,.32,1), height .3s cubic-bezier(.23,1,.32,1);
}
.cursor-ring {
  position:fixed; width:40px; height:40px;
  border-radius:50%; pointer-events:none; z-index:9999;
  transform:translate(-50%,-50%);
  background:rgba(255,255,255,0.03);
  backdrop-filter:var(--blur-xs);
  -webkit-backdrop-filter:var(--blur-xs);
  border:1px solid rgba(201,168,76,0.3);
  box-shadow:0 0 20px rgba(201,168,76,0.1), inset 0 1px 0 rgba(255,255,255,0.1);
  transition:left .12s cubic-bezier(.23,1,.32,1), top .12s cubic-bezier(.23,1,.32,1);
}

/* GLOBALS */
section {
  position:relative; z-index:1;
  padding:140px 60px; max-width:1200px; margin:0 auto;
}
.section-divider {
  width:100%; height:1px;
  background:linear-gradient(to right, transparent, rgba(201,168,76,0.25), transparent);
  margin:0 auto; max-width:800px;
}
.section-label {
  font-family:'DM Mono',monospace; font-size:.6rem;
  color:var(--gold); letter-spacing:.3em; text-transform:uppercase;
  margin-bottom:20px; display:flex; align-items:center; gap:12px;
}
.section-label::before { content:''; width:30px; height:1px; background:linear-gradient(to right,var(--gold),transparent); }
.section-title {
  font-family:'Playfair Display',serif;
  font-size:clamp(2rem,4vw,3.5rem); font-weight:700;
  line-height:1.1; margin-bottom:48px;
}
.section-title em { font-style:italic; color:var(--gold); text-shadow:0 0 30px rgba(201,168,76,0.3); }
.pause {
  text-align:center; font-family:'Playfair Display',serif;
  font-size:2rem; margin:120px 0; color:var(--cream-dim); opacity:.7;
}

/* ══ LIQUID GLASS BUTTONS ══ */
.btn-primary {
  font-family:'DM Mono',monospace; font-size:.7rem;
  letter-spacing:.2em; text-transform:uppercase;
  background:linear-gradient(135deg, var(--gold), var(--gold-light));
  color:var(--obsidian); border:none;
  padding:16px 44px; cursor:none;
  transition:all .4s cubic-bezier(.23,1,.32,1);
  position:relative; overflow:hidden;
  border-radius:100px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3), 0 0 0 1px rgba(201,168,76,0.3);
}
.btn-primary::before {
  content:'';
  position:absolute; inset:0;
  background:rgba(255,255,255,0.15);
  border-radius:100px;
  transform:scaleX(0); transform-origin:left;
  transition:transform .4s cubic-bezier(.23,1,.32,1);
}
.btn-primary:hover::before { transform:scaleX(1); }
.btn-primary:hover {
  box-shadow:0 0 30px rgba(201,168,76,0.35), 0 12px 32px rgba(0,0,0,0.4);
  transform:translateY(-3px) scale(1.02);
}

.btn-secondary {
  font-family:'DM Mono',monospace; font-size:.7rem;
  letter-spacing:.2em; text-transform:uppercase;
  background:var(--glass-bg);
  backdrop-filter:var(--blur-sm);
  -webkit-backdrop-filter:var(--blur-sm);
  color:var(--gold); border:1px solid rgba(201,168,76,0.25);
  padding:16px 44px; cursor:none;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  border-radius:100px;
  box-shadow:var(--glass-inset), 0 2px 12px rgba(0,0,0,0.2);
}
.btn-secondary:hover {
  border-color:var(--gold);
  background:rgba(201,168,76,0.08);
  box-shadow:0 0 0 1px rgba(201,168,76,0.15), var(--glass-inset), 0 4px 20px rgba(201,168,76,0.1);
  transform:translateY(-2px);
}

/* REVEAL ANIMATIONS */
.reveal { opacity:0; transform:translateY(40px); transition:1s cubic-bezier(.25,1,.5,1); }
.reveal.visible { opacity:1; transform:translateY(0); }
.reveal-delay-1 { transition-delay:.1s; }
.reveal-delay-2 { transition-delay:.2s; }

/* ══ LIQUID GLASS NAV ══ */
nav {
  position:fixed; top:0; left:0; right:0;
  z-index:1000; padding:16px 60px;
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(5,7,10,0.55);
  backdrop-filter:var(--blur-xl) saturate(180%);
  -webkit-backdrop-filter:var(--blur-xl) saturate(180%);
  border-bottom:1px solid rgba(255,255,255,0.07);
  box-shadow:0 1px 0 rgba(255,255,255,0.05), 0 8px 32px rgba(0,0,0,0.4), var(--glass-inset);
  transition:all .3s;
}
.nav-logo {
  font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700;
  color:var(--gold); letter-spacing:.05em; text-decoration:none;
  text-shadow:0 0 20px rgba(201,168,76,0.5);
}
.nav-logo span { color:var(--cream-dim); }
.nav-links { display:flex; gap:40px; list-style:none; }
.nav-links a {
  font-family:'DM Mono',monospace; font-size:.7rem;
  letter-spacing:.15em; text-transform:uppercase;
  color:var(--cream-dim); text-decoration:none; transition:color .3s;
}
.nav-links a:hover { color:var(--gold); }
.nav-cta {
  font-family:'DM Mono',monospace; font-size:.65rem;
  letter-spacing:.15em; text-transform:uppercase;
  color:var(--obsidian);
  background:linear-gradient(135deg, var(--gold), var(--gold-light));
  border:none; padding:10px 24px; cursor:none;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  border-radius:100px;
  box-shadow:0 2px 12px rgba(201,168,76,0.2), var(--glass-inset);
}
.nav-cta:hover {
  transform:translateY(-1px);
  box-shadow:0 0 20px rgba(201,168,76,0.3), 0 4px 16px rgba(0,0,0,0.3);
}

/* ══ HERO ══ */
#hero {
  min-height:100vh; display:flex; flex-direction:column;
  justify-content:center; align-items:center; text-align:center;
  padding:140px 40px 100px; overflow:hidden;
}
.hero-eyebrow {
  font-family:'DM Mono',monospace; font-size:.65rem;
  letter-spacing:.3em; text-transform:uppercase;
  color:var(--gold); margin-bottom:28px;
  background:rgba(201,168,76,0.08);
  backdrop-filter:var(--blur-xs);
  border:1px solid rgba(201,168,76,0.2);
  border-radius:100px;
  padding:8px 20px;
  box-shadow:var(--glass-inset), 0 0 20px rgba(201,168,76,0.06);
}
.hero-title {
  font-family:'Playfair Display',serif;
  font-size:clamp(3.5rem,8vw,8rem);
  font-weight:900; line-height:.95;
  letter-spacing:-.02em; margin-bottom:36px;
  animation:float 6s ease-in-out infinite;
}
.hero-title .line1 { display:block; color:var(--cream); }
.hero-title .line2 {
  display:block; font-style:italic;
  color:transparent;
  -webkit-text-stroke:1px var(--gold);
  text-shadow:0 0 40px rgba(201,168,76,0.3);
}
.hero-sub {
  font-size:1.2rem; font-weight:300;
  color:var(--cream-dim); max-width:560px;
  margin:0 auto 20px; line-height:1.6;
}
.hero-desc {
  font-size:1rem; font-style:italic;
  color:var(--cream-dim); max-width:480px;
  margin:0 auto 56px;
}
.hero-buttons { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; }
.hero-support {
  margin-top:60px; font-family:'DM Mono',monospace;
  font-size:.6rem; letter-spacing:.2em; text-transform:uppercase;
  color:var(--muted);
}

/* Hero orb — liquid glass sphere */
.hero-orb {
  position:absolute; width:600px; height:600px; border-radius:50%;
  background:radial-gradient(circle at 35% 35%, rgba(201,168,76,0.1) 0%, rgba(201,168,76,0.04) 40%, transparent 70%);
  top:50%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none;
  animation:orbPulse 8s ease-in-out infinite;
  /* Liquid glass sphere layers */
  box-shadow:
    inset 0 0 80px rgba(201,168,76,0.06),
    inset 40px 40px 100px rgba(255,255,255,0.03),
    inset -40px -40px 100px rgba(0,0,0,0.2),
    0 0 120px rgba(201,168,76,0.08);
  border:1px solid rgba(201,168,76,0.08);
  backdrop-filter:var(--blur-xs);
}
.hero-orb::before {
  content:'';
  position:absolute; top:8%; left:15%; width:40%; height:30%;
  background:radial-gradient(ellipse, rgba(255,255,255,0.06) 0%, transparent 70%);
  border-radius:50%;
  transform:rotate(-30deg);
}
.hero-orb::after {
  content:''; position:absolute; inset:60px; border-radius:50%;
  border:1px solid rgba(201,168,76,0.08);
  animation:orbRotate 20s linear infinite;
}

/* ══ PROBLEM SECTION ══ */
.problem-grid {
  display:grid; grid-template-columns:1fr 1fr;
  gap:80px; align-items:center;
}
.problem-text p {
  font-size:1.05rem; font-weight:300;
  color:var(--cream-dim); margin-bottom:20px; line-height:1.8;
}
.problem-bullets { list-style:none; margin-top:30px; }
.problem-bullets li {
  font-family:'DM Mono',monospace; font-size:.75rem;
  letter-spacing:.05em; color:var(--cream-dim);
  padding:12px 0; border-bottom:1px solid rgba(255,255,255,0.06);
  display:flex; align-items:center; gap:16px;
  transition:color .3s, padding-left .3s;
}
.problem-bullets li:hover { color:var(--gold); padding-left:8px; }
.problem-bullets li::before { content:'◆'; color:var(--gold); font-size:.5rem; flex-shrink:0; }

/* Liquid Glass 3D Quote Card */
.card-3d-wrapper { perspective:1000px; }
.card-3d {
  background:rgba(8,13,26,0.45);
  backdrop-filter:var(--blur-md) saturate(150%);
  -webkit-backdrop-filter:var(--blur-md) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:24px;
  padding:50px;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.23,1,.32,1), box-shadow .6s, border-color .3s;
  position:relative; overflow:hidden;
  box-shadow:var(--glass-shadow), var(--glass-inset), var(--glass-specular);
}
.card-3d::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:1px;
  background:linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.12) 40%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0.12) 60%, transparent 95%);
  border-radius:24px 24px 0 0;
}
.card-3d::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.03), transparent 70%);
  pointer-events:none; border-radius:24px;
}
.card-3d:hover {
  transform:rotateY(-8deg) rotateX(4deg) translateZ(20px);
  box-shadow:30px 30px 60px rgba(0,0,0,0.6), -5px -5px 30px rgba(201,168,76,0.1), var(--glass-inset);
  border-color:rgba(201,168,76,0.3);
  background:rgba(201,168,76,0.05);
}
.card-3d-inner { transform:translateZ(40px); position:relative; z-index:1; }
.big-quote {
  font-family:'Playfair Display',serif; font-size:6rem;
  line-height:.6; color:var(--gold-dim); opacity:.3;
  margin-bottom:-20px;
}
.quote-text {
  font-size:1.1rem; font-style:italic; font-weight:300;
  line-height:1.7; color:var(--cream); margin-bottom:24px;
}
.quote-attr {
  font-family:'DM Mono',monospace; font-size:.65rem;
  letter-spacing:.15em; text-transform:uppercase; color:var(--gold);
}

/* ══ BIAS CARDS ══ */
.bias-cards {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:16px; margin-top:60px;
}
.bias-card {
  background:rgba(8,13,26,0.45);
  backdrop-filter:var(--blur-md) saturate(150%);
  -webkit-backdrop-filter:var(--blur-md) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:20px;
  padding:40px 32px;
  position:relative; overflow:hidden;
  transition:all .5s cubic-bezier(.165,.84,.44,1);
  transform-style:preserve-3d;
  box-shadow:var(--glass-shadow), var(--glass-inset);
}
.bias-card::before {
  content:''; position:absolute; top:0; left:0; right:0;
  height:1px;
  background:linear-gradient(90deg, transparent 10%, rgba(255,255,255,0.1) 50%, transparent 90%);
  border-radius:20px 20px 0 0;
}
.bias-card::after {
  content:''; position:absolute; top:0; left:15%; right:15%;
  height:2px; transform:scaleX(0); transform-origin:left;
  transition:transform .4s cubic-bezier(.23,1,.32,1);
  background:linear-gradient(to right, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  box-shadow:0 0 16px rgba(201,168,76,0.6);
  border-radius:0 0 4px 4px;
}
.bias-card:hover::after { transform:scaleX(1); }
.bias-card:hover {
  border-color:rgba(201,168,76,0.25);
  transform:perspective(1000px) translateY(-12px) translateZ(12px) rotateX(3deg);
  background:rgba(201,168,76,0.05);
  box-shadow:0 0 0 1px rgba(201,168,76,0.1), 0 24px 60px rgba(0,0,0,0.65), 0 8px 20px rgba(201,168,76,0.08), var(--glass-inset);
}
.bias-num {
  font-family:'Playfair Display',serif; font-size:3.5rem;
  font-weight:900; color:rgba(201,168,76,0.08); line-height:1; margin-bottom:20px;
  user-select:none;
}
.bias-title {
  font-family:'Playfair Display',serif; font-size:1.2rem;
  font-weight:700; color:var(--cream); margin-bottom:14px;
}
.bias-body {
  font-size:.9rem; font-weight:300;
  color:var(--cream-dim); line-height:1.7;
}
.bias-tag {
  display:inline-block; margin-top:20px;
  font-family:'DM Mono',monospace; font-size:.52rem;
  letter-spacing:.2em; text-transform:uppercase;
  color:var(--gold); border:1px solid rgba(201,168,76,0.25);
  padding:4px 12px; border-radius:100px;
  background:rgba(201,168,76,0.06);
  backdrop-filter:var(--blur-xs);
  box-shadow:var(--glass-inset);
}

/* ══ SOLUTION ══ */
.solution-layout {
  display:grid; grid-template-columns:5fr 7fr;
  gap:80px; align-items:start;
}
.solution-text p {
  font-size:1.05rem; font-weight:300;
  color:var(--cream-dim); line-height:1.8; margin-bottom:20px;
}
.model-showcase { display:flex; flex-direction:column; gap:10px; }
.model-item {
  display:flex; align-items:stretch;
  background:rgba(8,13,26,0.45);
  backdrop-filter:var(--blur-md);
  -webkit-backdrop-filter:var(--blur-md);
  border:1px solid var(--glass-border);
  border-radius:16px; overflow:hidden; cursor:none;
  transition:all .4s cubic-bezier(.23,1,.32,1);
  box-shadow:var(--glass-inset), var(--glass-shadow);
  position:relative;
}
.model-item::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}
.model-item:hover {
  transform:translateX(10px) translateZ(6px);
  border-color:rgba(201,168,76,0.25);
  background:rgba(201,168,76,0.05);
  box-shadow:0 8px 24px rgba(201,168,76,0.08), var(--glass-inset);
}
.model-accent {
  width:3px; background:linear-gradient(to bottom, var(--gold), var(--gold-dim));
  flex-shrink:0; transition:width .3s;
  box-shadow:0 0 8px rgba(201,168,76,0.4);
}
.model-item:hover .model-accent { width:5px; }
.model-content { padding:28px 32px; flex:1; position:relative; z-index:1; }
.model-name {
  font-family:'Playfair Display',serif; font-size:1rem;
  font-weight:700; color:var(--cream); margin-bottom:8px;
}
.model-desc { font-size:.85rem; font-weight:300; color:var(--cream-dim); line-height:1.6; }

/* ══ LEARN PANELS ══ */
.learn-split {
  display:grid; grid-template-columns:1fr 1fr;
  gap:16px; margin-top:60px;
}
.learn-panel {
  padding:50px;
  background:rgba(8,13,26,0.45);
  backdrop-filter:var(--blur-md) saturate(150%);
  -webkit-backdrop-filter:var(--blur-md) saturate(150%);
  border:1px solid var(--glass-border);
  border-radius:24px; position:relative; overflow:hidden;
  transition:all .5s cubic-bezier(.23,1,.32,1);
  box-shadow:var(--glass-shadow), var(--glass-inset);
}
.learn-panel::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent 5%, rgba(255,255,255,0.12) 50%, transparent 95%);
  border-radius:24px 24px 0 0;
}
.learn-panel::after {
  content:''; position:absolute; top:0; left:15%; right:15%;
  height:2px; transform:scaleX(0); transform-origin:left;
  transition:transform .4s cubic-bezier(.23,1,.32,1);
  background:linear-gradient(to right, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
  box-shadow:0 0 16px rgba(201,168,76,0.5);
  border-radius:0 0 4px 4px;
}
.learn-panel:hover::after { transform:scaleX(1); }
.learn-panel:hover {
  transform:translateY(-8px);
  border-color:rgba(201,168,76,0.25);
  box-shadow:0 24px 60px rgba(0,0,0,0.6), 0 8px 20px rgba(201,168,76,0.08), var(--glass-inset);
}
.panel-title {
  font-family:'Playfair Display',serif; font-size:1.6rem;
  font-weight:700; margin-bottom:20px; color:var(--cream);
}
.panel-body {
  font-size:.95rem; font-weight:300;
  color:var(--cream-dim); line-height:1.8; margin-bottom:36px;
}
.concept-list { list-style:none; display:flex; flex-direction:column; gap:12px; }
.concept-item {
  background:rgba(255,255,255,0.03);
  backdrop-filter:var(--blur-xs);
  border:1px solid rgba(255,255,255,0.07);
  padding:20px 24px; border-radius:14px;
  transition:all .3s cubic-bezier(.23,1,.32,1);
  box-shadow:var(--glass-inset);
}
.concept-item:hover {
  border-color:rgba(201,168,76,0.3);
  background:rgba(201,168,76,0.05);
  transform:translateX(5px);
  box-shadow:0 4px 16px rgba(201,168,76,0.07), var(--glass-inset);
}
.concept-item-title {
  font-family:'Playfair Display',serif; font-size:1rem;
  font-weight:700; color:var(--gold); margin-bottom:6px;
}
.concept-item-desc { font-size:.85rem; font-weight:300; color:var(--cream-dim); line-height:1.5; }

/* ══ STEPS ══ */
.steps-container {
  margin-top:70px; position:relative;
  max-width:800px; margin-left:auto; margin-right:auto;
}
